name: "🐛 Bug Report"
description: Report a bug to help us improve rina-hermes-acp
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the sections below.

        **Before submitting**, please:
        - [ ] Search [existing issues](https://github.com/jove-rina/rina-hermes-acp/issues) to avoid duplicates
        - [ ] Try restarting VS Code / Cursor and the Hermes ACP connection

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: What happened? What did you expect instead?
      placeholder: |
        When I click the copy button on a code block, it copies markdown fences instead of just the code...
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this bug?
      placeholder: |
        1. Open VS Code
        2. Click Hermes icon in activity bar
        3. Send a message with a code block
        4. Click copy button
        5. Paste into editor — see ``` fences
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Please fill in your setup
      placeholder: |
        - Extension version: 0.3.0
        - VS Code / Cursor version: 1.98.0
        - OS: macOS 15.7
        - Hermes Agent version: 0.17.0
    validations:
      required: false
