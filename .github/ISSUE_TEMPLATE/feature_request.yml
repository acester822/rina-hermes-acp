name: "✨ Feature Request"
description: Suggest an idea for rina-hermes-acp
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! We'd love to hear your ideas.

        **Before submitting**, please:
        - [ ] Search [existing issues](https://github.com/jove-rina/rina-hermes-acp/issues) to see if this has been requested already

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: Is your feature request related to a problem? Describe it.
      placeholder: |
        I'm always frustrated when I have to switch between VS Code and the terminal to run Hermes commands...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: What would you like to see?
      placeholder: |
        Add a command palette integration so I can run Hermes commands with Cmd+Shift+P...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any workarounds you've tried?
    validations:
      required: false
